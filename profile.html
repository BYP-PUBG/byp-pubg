<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYP : Build Your Play — โปรไฟล์</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const _supa = window.supabase.createClient(
    'https://llijafxfyeeehxeeuwvv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsaWphZnhmeWVlZWh4ZWV1d3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjUwMjQsImV4cCI6MjA4ODk0MTAyNH0.u_jiWxNpZvTQFOMaJ0DfSZhMp1ysqUTk-vvIoHzxkNY',
  { auth: { storage: window.localStorage, storageKey: 'byp-auth', detectSessionInUrl: true, persistSession: true, autoRefreshToken: true } }
  );
</script>
<style>
:root {
  --bg:#07080a; --bg2:#0e0f12; --surf:#131417; --surf2:#1a1b1f;
  --border:#272830; --bord2:#32333e;
  --gold:#f5c842; --golddim:rgba(245,200,66,0.08);
  --text:#f0f1f5; --text2:#8e8f9e; --text3:#45464f;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow','Noto Sans Thai',sans-serif;min-height:100vh;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;background:rgba(13,14,18,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:1px;}
.nav-logo span{color:var(--gold);}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;transition:all .15s;}
.nav-link:hover{color:var(--text);background:var(--surf2);}
.nav-link.active{color:var(--gold);}

/* PAGE */
.page{max-width:680px;margin:0 auto;padding:36px 20px 60px;}

/* SECTION TITLE */
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;}

/* CARD */
.card{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.card::before{content:'';display:block;height:3px;}
.card.gold::before{background:linear-gradient(90deg,var(--gold),rgba(245,200,66,0.15));}
.card.purple::before{background:linear-gradient(90deg,#6366f1,rgba(99,102,241,0.15));}
.card.green::before{background:linear-gradient(90deg,#22c55e,rgba(34,197,94,0.15));}
.card-body{padding:24px;}

/* PROFILE HEADER */
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.avatar{width:56px;height:56px;border-radius:50%;background:var(--golddim);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.profile-email{font-size:16px;font-weight:600;color:var(--text);}
.profile-role{font-size:11px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;margin-top:3px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.info-label{font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}
.info-val{font-size:14px;font-weight:600;color:var(--text);margin-top:4px;}

/* SETUP CARD */
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.setup-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.setup-row:last-child{border-bottom:none;}
.setup-lbl{font-size:12px;color:var(--text2);}
.setup-val{font-size:13px;font-weight:600;color:var(--text);}
.setup-val.gold{color:var(--gold);}

.no-setup{text-align:center;padding:32px 0;}
.no-setup-icon{font-size:40px;margin-bottom:12px;}
.no-setup-text{font-size:14px;color:var(--text2);margin-bottom:20px;}
.btn-gold{display:inline-block;padding:11px 24px;background:var(--gold);color:#08090b;border-radius:8px;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;border:none;cursor:pointer;transition:all .15s;}
.btn-gold:hover{background:#e8a820;transform:translateY(-1px);}
.btn-outline{display:inline-block;padding:10px 22px;background:transparent;color:var(--text2);border-radius:8px;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px;border:1px solid var(--bord2);cursor:pointer;transition:all .15s;}
.btn-outline:hover{color:var(--gold);border-color:var(--gold);}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;margin-bottom:7px;}
.form-input{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:11px 14px;outline:none;font-family:'Barlow',sans-serif;transition:border-color .2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--text3);}
.btn-purple{width:100%;padding:12px;border-radius:8px;border:none;background:#6366f1;color:#fff;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;transition:all .15s;}
.btn-purple:hover{background:#4f46e5;}
.btn-purple:disabled{opacity:.5;cursor:not-allowed;}

.msg{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;display:none;}
.msg.show{display:block;}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;}

/* LOGOUT */
.btn-red{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(239,68,68,.3);background:transparent;color:#fca5a5;font-size:14px;font-weight:600;letter-spacing:.5px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;transition:all .15s;}
.btn-red:hover{background:rgba(239,68,68,.1);}

/* Loading */
.loading{text-align:center;padding:60px 0;color:var(--text2);font-size:14px;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">BYP<span> : BUILD YOUR PLAY</span></div>
  <div class="nav-links">
    <button class="nav-link" onclick="location.href='pubg-browse.html'">Browse</button>
    <button class="nav-link active">โปรไฟล์</button>
  </div>
  <div id="navRight"></div>
</nav>

<div class="page" id="mainPage">
  <div class="loading">⏳ กำลังโหลด...</div>
</div>

<script>
async function init() {
  const { data: { session } } = await _supa.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const user = session.user;

  // โหลด profile และ setup พร้อมกัน
  const [{ data: profile }, { data: setup }] = await Promise.all([
    _supa.from('profiles').select('role, created_at').eq('id', user.id).single(),
    _supa.from('setups').select('*').eq('user_id', user.id).single(),
  ]);

  const role = profile?.role || 'user';
  const joinDate = profile?.created_at
    ? new Date(profile.created_at).toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' })
    : '—';
  const email = user.email || '—';
  const shortName = email.split('@')[0];

  document.getElementById('mainPage').innerHTML = `

    <!-- Account Info -->
    <div class="sec-title">ข้อมูลบัญชี</div>
    <div class="card gold">
      <div class="card-body">
        <div class="profile-header">
          <div class="avatar">${role === 'admin' ? '👑' : '🎮'}</div>
          <div>
            <div class="profile-email">${email}</div>
            <div class="profile-role">${role === 'admin' ? 'ADMIN' : 'MEMBER'}</div>
          </div>
        </div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">ชื่อ</div>
            <div class="info-val">${shortName}</div>
          </div>
          <div class="info-item">
            <div class="info-label">วันที่สมัคร</div>
            <div class="info-val" style="font-size:12px;">${joinDate}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Provider</div>
            <div class="info-val">${user.app_metadata?.provider === 'google' ? '🔵 Google' : '📧 Email'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">สถานะ</div>
            <div class="info-val" style="color:#22c55e;">● Active</div>
          </div>
        </div>
      </div>
    </div>

    <!-- My Setup -->
    <div class="sec-title">Setup ของฉัน</div>
    <div class="card green">
      <div class="card-body">
        ${setup ? `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div>
              <div style="font-size:18px;font-weight:700;color:var(--gold);font-family:'Barlow Condensed',sans-serif;">${setup.ign || '—'}</div>
              <div style="font-size:11px;color:var(--text2);margin-top:2px;">อัพเดตล่าสุด: ${new Date(setup.created_at).toLocaleDateString('th-TH')}</div>
            </div>
            <a href="pubg-setup-v1.html" class="btn-outline">✏️ แก้ไข</a>
          </div>
          <div>
            ${setupRow('Mouse', setup.mouse)}
            ${setupRow('DPI', setup.dpi, true)}
            ${setupRow('Grip / Arm', (setup.grip||'—') + ' / ' + (setup.arm||'—'))}
            ${setupRow('General Sens', setup.gen_sens, true)}
            ${setupRow('ADS Sens', setup.ads_sens)}
            ${setupRow('GPU', (setup.gpu_brand||'') + ' ' + (setup.gpu_model||'—'), true)}
            ${setupRow('CPU', (setup.cpu_brand||'') + ' ' + (setup.cpu_model||'—'))}
            ${setupRow('RAM / Storage', (setup.ram||'—') + ' · ' + (setup.storage||'—'))}
            ${setupRow('Monitor', (setup.mon_size||'—') + ' · ' + (setup.mon_hz||'—'), true)}
            ${setupRow('FPS เฉลี่ย', setup.avg_fps, true)}
            ${setupRow('Mousepad', setup.pad)}
            ${setupRow('Graphics', setup.gfx)}
          </div>
        ` : `
          <div class="no-setup">
            <div class="no-setup-icon">🎯</div>
            <div class="no-setup-text">คุณยังไม่ได้กรอก Setup</div>
            <a href="pubg-setup-v1.html" class="btn-gold">+ กรอก Setup ของฉัน</a>
          </div>
        `}
      </div>
    </div>

    <!-- Reset Password (เฉพาะ email login) -->
    ${user.app_metadata?.provider !== 'google' ? `
    <div class="sec-title">ความปลอดภัย</div>
    <div class="card purple">
      <div class="card-body">
        <div class="msg" id="resetMsg"></div>
        <div class="form-group">
          <label class="form-label">รหัสผ่านใหม่</label>
          <input type="password" class="form-input" id="newPass" placeholder="อย่างน้อย 6 ตัวอักษร">
        </div>
        <div class="form-group">
          <label class="form-label">ยืนยันรหัสผ่านใหม่</label>
          <input type="password" class="form-input" id="confirmPass" placeholder="กรอกอีกครั้ง">
        </div>
        <button class="btn-purple" onclick="resetPassword()">🔒 เปลี่ยนรหัสผ่าน</button>
      </div>
    </div>
    ` : `
    <div class="sec-title">ความปลอดภัย</div>
    <div class="card purple">
      <div class="card-body" style="text-align:center;padding:20px;">
        <div style="font-size:32px;margin-bottom:8px;">🔵</div>
        <div style="font-size:14px;color:var(--text2);">คุณ Login ด้วย Google<br>จัดการรหัสผ่านได้ที่ Google Account ของคุณ</div>
      </div>
    </div>
    `}

    <!-- Logout -->
    <div class="sec-title">บัญชี</div>
    <div class="card">
      <div class="card-body">
        <button class="btn-red" onclick="logout()">ออกจากระบบ</button>
      </div>
    </div>
  `;
}

function setupRow(label, val, isGold = false) {
  return `<div class="setup-row">
    <span class="setup-lbl">${label}</span>
    <span class="setup-val${isGold ? ' gold' : ''}">${val || '—'}</span>
  </div>`;
}

async function resetPassword() {
  const newPass     = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  const msgEl       = document.getElementById('resetMsg');

  const showMsg = (text, type) => {
    msgEl.className = 'msg ' + type + ' show';
    msgEl.textContent = text;
  };

  if (!newPass) return showMsg('กรุณากรอกรหัสผ่านใหม่', 'error');
  if (newPass.length < 6) return showMsg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
  if (newPass !== confirmPass) return showMsg('รหัสผ่านไม่ตรงกัน', 'error');

  const btn = document.querySelector('.btn-purple');
  btn.disabled = true; btn.textContent = 'กำลังเปลี่ยน...';

  const { error } = await _supa.auth.updateUser({ password: newPass });
  btn.disabled = false; btn.textContent = '🔒 เปลี่ยนรหัสผ่าน';

  if (error) {
    showMsg('เกิดข้อผิดพลาด: ' + error.message, 'error');
  } else {
    showMsg('✅ เปลี่ยนรหัสผ่านสำเร็จแล้ว!', 'success');
    document.getElementById('newPass').value = '';
    document.getElementById('confirmPass').value = '';
  }
}

async function logout() {
  await _supa.auth.signOut();
  window.location.href = 'pubg-browse.html';
}

init();
</script>
</body>
</html>
