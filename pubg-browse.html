<style>
:root {
  --bg:     #07080a;
  --bg2:    #0e0f12;
  --surf:   #131417;
  --surf2:  #1a1b1f;
  --surf3:  #21222a;
  --border: #272830;
  --bord2:  #32333e;
  --gold:   #f5c842;
  --goldf:  rgba(245,200,66,0.10);
  --red:    #ef4444;
  --green:  #22c55e;
  --blue:   #3b82f6;
  --purple: #a855f7;
  --text:   #f0f1f5;
  --text2:  #8e8f9e;
  --text3:  #45464f;

}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow','Noto Sans Thai',sans-serif;
  min-height:100vh;
}

/* noise */
body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.25;

/* ===== TOPNAV ===== */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
  background:rgba(13,14,18,0.97);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;
  backdrop-filter:blur(12px);
  gap:8px;
}
.nav-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:900;letter-spacing:1px;
  flex-shrink:0;
}
.nav-logo span{color:var(--gold);}
.nav-links{display:flex;gap:2px;flex-shrink:0;}
.nav-link{
  padding:5px 10px;border-radius:6px;
  font-size:12px;font-weight:600;
  color:var(--text2);cursor:pointer;border:none;background:none;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;transition:all .15s;
  white-space:nowrap;
}
.nav-link:hover{color:var(--text);background:var(--surf2);}
.nav-link.active{color:var(--gold);background:var(--goldf);}
.nav-count{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:1px;color:var(--text3);
  white-space:nowrap;
}
.nav-count span{color:var(--gold);}
@media(max-width:600px){
  .nav-logo span{ display:none; }
  .nav-count{ display:none; }
}

/* ===== HERO ===== */
.hero{
  padding:48px 32px 36px;
  background:linear-gradient(180deg,rgba(245,200,66,.04) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  text-align:center;
}
.hero-eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;
}
.hero-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(32px,5vw,56px);font-weight:900;
  letter-spacing:-1px;line-height:1;
  color:var(--text);margin-bottom:10px;
}
.hero-title span{color:var(--gold);}
.hero-sub{color:var(--text2);font-size:15px;max-width:500px;margin:0 auto 28px;line-height:1.6;}

/* Search bar */
.search-wrap{
  display:flex;gap:10px;max-width:580px;margin:0 auto;
  align-items:center;
}
.search-box{
  flex:1;display:flex;align-items:center;gap:10px;
  background:var(--surf2);border:1px solid var(--bord2);
  border-radius:10px;padding:10px 16px;
  transition:border-color .2s;
}
.search-box:focus-within{border-color:var(--gold);}
.search-icon{color:var(--text3);font-size:14px;}
.search-box input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:'Barlow','Noto Sans Thai',sans-serif;
}
.search-box input::placeholder{color:var(--text3);}

.sort-select{
  background:var(--surf2);border:1px solid var(--bord2);
  border-radius:8px;padding:10px 12px;
  color:var(--text2);font-size:13px;
  font-family:'Barlow',sans-serif;outline:none;cursor:pointer;
  transition:border-color .2s;
}
.sort-select:focus{border-color:var(--gold);}
.sort-select option{background:var(--surf3);}

/* Filter chips */
.filter-row{
  display:flex;gap:8px;justify-content:center;
  flex-wrap:wrap;margin-top:16px;
}
.fchip{
  padding:5px 14px;border-radius:20px;
  border:1px solid var(--bord2);background:transparent;
  color:var(--text2);font-size:12px;font-weight:500;
  cursor:pointer;font-family:'Barlow',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.fchip:hover{border-color:var(--gold);color:var(--text);}
.fchip.on{background:var(--goldf);border-color:rgba(245,200,66,.4);color:var(--gold);font-weight:600;}

/* ===== GRID ===== */
.page-wrap{max-width:1200px;margin:0 auto;padding:32px 24px 80px;}

.results-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;font-size:13px;color:var(--text3);
}
.results-bar strong{color:var(--text2);}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px;
}

/* ===== SETUP CARD ===== */
.setup-card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  cursor:pointer;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  position:relative;
}
.setup-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),rgba(245,200,66,0));
  opacity:0;transition:opacity .2s;
}
.setup-card:hover{
  border-color:rgba(245,200,66,.35);
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.4);
}
.setup-card:hover::before{opacity:1;}

/* Card header */
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
}
.card-ign{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:800;letter-spacing:.3px;
  color:var(--text);
}
.card-time{font-size:11px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;}

/* Desktop 2D view */
.desktop-view{
  padding:12px 14px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}
canvas.dv{
  display:block;width:100%;border-radius:6px;
  background:#0a0b0e;
}

/* Stats row */
.card-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--border);
}
.cstat{
  padding:10px 8px;text-align:center;
  border-right:1px solid var(--border);
}
.cstat:last-child{border-right:none;}
.cstat-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:19px;font-weight:800;color:var(--gold);
  line-height:1;
}
.cstat-lbl{font-size:9px;color:var(--text3);margin-top:3px;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}

/* PUBG sens */
.sens-strip{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
}
.sblk{
  flex:1;padding:8px 6px;text-align:center;
  border-right:1px solid var(--border);
}
.sblk:last-child{border-right:none;}
.sblk-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;color:var(--text);line-height:1;
}
.sblk-lbl{font-size:8px;color:var(--text3);margin-top:2px;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}

/* Card footer */
.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
}
.foot-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{
  padding:2px 8px;border-radius:4px;
  font-size:10px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;letter-spacing:.5px;
}
.t-grip-Palm{background:rgba(59,130,246,.14);color:#60a5fa;}
.t-grip-Claw{background:rgba(168,85,247,.14);color:#c084fc;}
.t-grip-Fingertip{background:rgba(34,197,94,.14);color:#4ade80;}
.t-nvidia{background:rgba(118,185,0,.14);color:#84cc16;}
.t-amd{background:rgba(239,68,68,.14);color:#f87171;}
.t-intel{background:rgba(59,130,246,.14);color:#60a5fa;}
.t-fps{background:rgba(245,200,66,.1);color:var(--gold);}

.foot-arrow{
  font-size:16px;color:var(--text3);
  transition:color .15s,transform .15s;
}
.setup-card:hover .foot-arrow{color:var(--gold);transform:translateX(3px);}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-t{font-family:'Barlow Condensed',sans-serif;font-size:20px;margin-bottom:8px;color:var(--text2);}

/* Load more */
.load-more-wrap{text-align:center;margin-top:32px;}
.btn-more{
  padding:12px 36px;border-radius:8px;
  border:1px solid var(--bord2);background:transparent;
  color:var(--text2);font-size:14px;font-weight:600;
  cursor:pointer;font-family:'Barlow',sans-serif;
  transition:all .2s;
}
.btn-more:hover{border-color:var(--gold);color:var(--gold);}

/* ===== DETAIL OVERLAY ===== */
.overlay{
  display:none;position:fixed;inset:0;z-index:50;

  align-items:center;justify-content:center;
  padding:20px;overflow:hidden;
}
.overlay.show{display:flex;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

.star-row { display:flex; align-items:center; gap:2px; }
.star { font-size:15px; cursor:pointer; color:var(--text3); transition:color .15s; line-height:1; }
.star.on { color:var(--gold); }
.star:hover, .star:hover ~ .star { color:var(--gold); }
.star-row:hover .star { color:var(--gold); }
.star-row .star:hover ~ .star { color:var(--text3); }
.star-count { font-size:10px; color:var(--text2); font-family:'Barlow Condensed',sans-serif; margin-left:2px; }
.dm-star-row { display:flex; align-items:center; gap:4px; margin-bottom:16px; }
.dm-star { font-size:22px; cursor:pointer; color:var(--text3); transition:color .15s; }
.dm-star.on { color:var(--gold); }
.dm-star-count { font-size:13px; color:var(--text2); font-family:'Barlow Condensed',sans-serif; margin-left:6px; }
.detail-modal{
  background:var(--surf);
  border:1px solid var(--bord2);
  border-radius:14px;
  width:100%;max-width:720px;
  height:88vh;
  overflow-y:auto;
  overscroll-behavior:contain;
}

.dm-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:22px 26px 18px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surf);z-index:1;
}
.dm-ign{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;font-weight:900;color:var(--gold);letter-spacing:.5px;
}
.dm-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.dm-close{
  width:34px;height:34px;border-radius:7px;
  border:1px solid var(--bord2);background:transparent;
  color:var(--text2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.dm-close:hover{border-color:var(--red);color:var(--red);}

.dm-body{padding:22px 26px;}

/* 2D big view */
.dm-desktop{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:16px;margin-bottom:22px;
  text-align:center;
}
.dm-desktop-label{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;color:var(--text3);
  margin-bottom:10px;
}
canvas.dv-big{display:block;width:100%;border-radius:8px;background:#0a0b0e;}

/* PUBG big sens */
.dm-sens-row{
  display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;
}
.dmsbox{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:12px 8px;text-align:center;
}
.dmsbox-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--gold);}
.dmsbox-lbl{font-size:9px;color:var(--text3);margin-top:4px;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}

/* Detail grid */
.dm-sec-title{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:var(--text3);
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);
}
.dm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.dmf{background:var(--surf2);border-radius:7px;padding:11px 13px;}
.dmf-lbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;}
.dmf-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text);}
.dmf-val.gold{color:var(--gold);}
.dm-notes{background:var(--surf2);border-radius:8px;padding:14px 16px;font-size:14px;color:var(--text2);line-height:1.7;font-style:italic;}

@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr;}
  .dm-sens-row{grid-template-columns:repeat(3,1fr);}
  nav{padding:0 16px;}
  .hero{padding:32px 16px 24px;}
  .page-wrap{padding:24px 16px 60px;}
}
</style>

<script>
// ===== DATA =====
let allData = [], filtered = [], visibleCount = 12;
let activeFilter = 'all';

function mapRow(d) {
  return {
    id:        d.id,
    ign:       d.ign,       height:    d.height,
    mouse:     d.mouse,     dpi:       d.dpi,
    hz:        d.hz,        grip:      d.grip,
    arm:       d.arm,       invert:    d.invert,
    genSens:   d.gen_sens,  vertMult:  d.vert_mult,
    aimSens:   d.aim_sens,  adsSens:   d.ads_sens,
    scopeSens: d.scope_sens,univScope: d.univ_scope,
    tableH:    d.table_h,   tableSize: d.table_size,
    pad:       d.pad,       monSize:   d.mon_size,
    monHz:     d.mon_hz,    monDist:   d.mon_dist,
    monX:      d.mon_x,     monDeg:    d.mon_deg,
    cpuBrand:  d.cpu_brand, cpuModel:  d.cpu_model,
    gpuBrand:  d.gpu_brand, gpuModel:  d.gpu_model,
    ram:       d.ram,       storage:   d.storage,
    os:        d.os,        avgFps:    d.avg_fps,
    gfx:       d.gfx,       notes:     d.notes,
    timestamp: d.created_at, verified:  d.verified,
    avatarUrl: d.avatar_url,
    youtube: d.youtube, facebook: d.facebook,
    tiktok: d.tiktok, twitch: d.twitch, discord: d.discord,
    scopeX2: d.scope_x2, scopeX3: d.scope_x3, scopeX4: d.scope_x4,
    scopeX6: d.scope_x6, scopeX8: d.scope_x8, scopeX15: d.scope_x15,
  };
}

async function loadData() {
  const { data, error } = await _supa
    .from('setups')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  allData = data.map(mapRow);
  applyFilters();
}

// ===== DEMO DATA =====
async function loadDemo() {
  const igns = ['SnakeEyes_TH','KiraFrag','ZeroRecoil','GhostPUBG','NightCrawler','SniperKing99','BlindFire','StormBolt','IronWrist','AceHunter','TactikZ','ProPlayerX'];
  const mice = ['Logitech G Pro X S2','Razer Viper V3 Pro','Zowie EC2-C','Finalmouse Starlight','SteelSeries Prime','Logitech G502 X','Razer DeathAdder V3','Pulsar X2'];
  const grips = ['Palm','Claw','Fingertip'];
  const arms  = ['Wrist Only','Arm Aim','Hybrid'];
  const pads  = ['S (250×210mm)','M (350×300mm)','L (450×400mm)','XL (900×400mm)'];
  const monS  = ['24"','27"','32"'];
  const monHz = ['144Hz','165Hz','240Hz','360Hz'];
  const gfxs  = ['Very Low','Very Low','Low','Medium','High'];
  const pick  = a => a[Math.floor(Math.random()*a.length)];
  const rng   = (a,b) => Math.round(a+Math.random()*(b-a));

  const demos = igns.map((ign) => {
    const cpuB = pick(['Intel','Intel','AMD']);
    const gpuB = pick(['NVIDIA','NVIDIA','NVIDIA','AMD']);
    const dpi  = pick([400,800,800,1600]);
    const gen  = rng(35,65);
    return {
      ign, height: rng(160,185)+' cm', mouse: pick(mice),
      dpi: String(dpi), hz: pick(['500Hz','1000Hz','1000Hz','2000Hz']),
      grip: pick(grips), arm: pick(arms),
      invert:'Disable', gen_sens:String(gen),
      vert_mult: Math.random()>.7?'1.1':'1.0',
      aim_sens:String(rng(gen-5,gen+5)),
      ads_sens:String(rng(gen-8,gen+2)),
      scope_sens:String(rng(gen-5,gen+5)),
      univ_scope:'Enable',
      table_h:rng(70,85)+' cm',
      table_size:rng(100,160)+'×'+rng(55,80)+' cm',
      pad:pick(pads),
      mon_size:pick(monS), mon_hz:pick(monHz),
      mon_dist:rng(50,80)+' cm',
      cpu_brand:cpuB,
      cpu_model:pick(cpuB==='Intel'?['i5-13600K','i7-13700K','i9-13900K']:['Ryzen 5 7600X','Ryzen 7 7700X']),
      gpu_brand:gpuB,
      gpu_model:pick(gpuB==='NVIDIA'?['RTX 4070','RTX 4070 Ti','RTX 4080','RTX 3080']:['RX 7900 XT','RX 6800 XT']),
      ram:pick(['16GB','16GB','32GB','64GB']),
      storage:pick(['NVMe SSD','NVMe SSD','SSD SATA']),
      os:pick(['Windows 11','Windows 11','Windows 10']),
      avg_fps:String(rng(80,220))+' FPS',
      gfx:pick(gfxs), notes:'',
    };
  });

  const { error } = await _supa.from('setups').insert(demos);
  if (error) { alert('Error: '+error.message); return; }
  loadData();
}

// ===== FILTER & SORT =====
function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  visibleCount = 12;
  applyFilters();
}

function applyFilters() {
  const q   = (document.getElementById('searchInput').value||'').toLowerCase();
  const srt = document.getElementById('sortSelect').value;

  filtered = allData.filter(d => {
    const grip = d.grip||'';
    const gpuB = d.gpuBrand||'';
    const hz   = d.hz||'';
    let pass = true;
    if (activeFilter==='Palm')      pass = grip==='Palm';
    if (activeFilter==='Claw')      pass = grip==='Claw';
    if (activeFilter==='Fingertip') pass = grip==='Fingertip';
    if (activeFilter==='NVIDIA')    pass = gpuB==='NVIDIA';
    if (activeFilter==='AMD')       pass = gpuB==='AMD';
    if (activeFilter==='1000Hz')    pass = ['1000Hz','2000Hz','4000Hz'].includes(hz);
    if (activeFilter==='Verified')  pass = !!d.verified;
    if (q) pass = pass && [d.ign,d.mouse,d.gpuModel,d.cpuModel,d.grip].some(v=>(v||'').toLowerCase().includes(q));
    return pass;
  });

  filtered.sort((a,b)=>{
    if (srt==='newest')    return new Date(b.timestamp||0)-new Date(a.timestamp||0);
    if (srt==='dpi_asc')   return +a.dpi - +b.dpi;
    if (srt==='dpi_desc')  return +b.dpi - +a.dpi;
    if (srt==='fps_desc')  return parseFloat(b.avgFps)-parseFloat(a.avgFps);
    if (srt==='sens_asc')  return +a.genSens - +b.genSens;
    return 0;
  });

  document.getElementById('navCount').textContent = allData.length;
  document.getElementById('resultsText').innerHTML = `พบ <strong>${filtered.length}</strong> setups`;
  renderCards();
}

function loadMore(){
  visibleCount += 12;
  renderCards();
}

// ===== RENDER CARDS =====
function renderCards() {
  const grid  = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');
  const lmw   = document.getElementById('loadMoreWrap');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    lmw.style.display = 'none';
    return;
  }
  empty.style.display = 'none';

  const slice = filtered.slice(0, visibleCount);
  grid.innerHTML = slice.map((d,i) => buildCard(d,i)).join('');

  // Draw canvases after render
  slice.forEach((d,i) => drawDesktop('dvc-'+i, d, 312, 160));

  lmw.style.display = visibleCount < filtered.length ? 'block' : 'none';
}

function timeAgo(ts){
  if(!ts) return '—';
  const s = Math.floor((Date.now()-new Date(ts))/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// ===== RATINGS =====
let _myRatings = {}; // setup_id → stars
let _allRatings = {}; // setup_id → {avg, count}
let _currentUserId = null;

async function loadRatings() {
  const { data: { session } } = await _supa.auth.getSession();
  _currentUserId = session?.user?.id || null;

  // โหลด ratings ทั้งหมด
  const { data: rows } = await _supa.from('ratings').select('setup_id, stars, user_id');
  if (!rows) return;

  // คำนวณ avg + count ต่อ setup
  _allRatings = {};
  rows.forEach(r => {
    if (!_allRatings[r.setup_id]) _allRatings[r.setup_id] = { total:0, count:0 };
    _allRatings[r.setup_id].total += r.stars;
    _allRatings[r.setup_id].count += 1;
    if (_currentUserId && r.user_id === _currentUserId) _myRatings[r.setup_id] = r.stars;
  });

  // render ดาวใน cards
  allData.forEach(d => { if (d.id) renderStars(d.id); });
}

function renderStars(setupId) {
  const row = document.getElementById('stars-' + setupId);
  if (!row) return;
  const r = _allRatings[setupId];
  const avg = r ? Math.round(r.total / r.count) : 0;
  const my  = _myRatings[setupId] || 0;
  const display = my || avg;

  row.querySelectorAll('.star').forEach(s => {
    s.textContent = parseInt(s.dataset.s) <= display ? '★' : '☆';
    s.classList.toggle('on', parseInt(s.dataset.s) <= display);
    s.style.cursor = 'pointer';
  });
  const sc = document.getElementById('sc-' + setupId);
  if (sc) sc.textContent = r ? `${(r.total/r.count).toFixed(1)} (${r.count})` : '';
}

async function rateStar(setupId, stars) {
  if (!_currentUserId) { alert('กรุณา Login ก่อนให้ดาวครับ'); return; }

  const existing = _myRatings[setupId];

  if (existing) {
    // มีแล้ว → UPDATE
    await _supa.from('ratings').update({ stars }).eq('setup_id', setupId).eq('user_id', _currentUserId);
    if (_allRatings[setupId]) _allRatings[setupId].total += (stars - existing);
  } else {
    // ยังไม่มี → INSERT
    await _supa.from('ratings').insert([{ setup_id: setupId, user_id: _currentUserId, stars }]);
    if (!_allRatings[setupId]) _allRatings[setupId] = { total:0, count:0 };
    _allRatings[setupId].total += stars;
    _allRatings[setupId].count += 1;
  }

  _myRatings[setupId] = stars;
  renderStars(setupId);
  const dmStars = document.querySelectorAll('.dm-star');
  if (dmStars.length && dmStars[0].dataset.id === setupId) renderDmStars(setupId);
}

function renderDmStars(setupId) {
  const r   = _allRatings[setupId];
  const my  = _myRatings[setupId] || 0;
  const avg = r ? r.total / r.count : 0;
  document.querySelectorAll('.dm-star').forEach(s => {
    const v = parseInt(s.dataset.s);
    s.textContent = v <= (my || Math.round(avg)) ? '★' : '☆';
    s.classList.toggle('on', v <= (my || Math.round(avg)));
  });
  const sc = document.getElementById('dm-star-count');
  if (sc) sc.textContent = r ? `${avg.toFixed(1)} ★ (${r.count} รีวิว)${my?' · คุณให้ '+my+' ดาว':''}` : 'ยังไม่มีรีวิว';
}

async function adminDeleteCard(id) {
  if (!confirm('ลบ Setup นี้ออกจากระบบ?')) return;
  const { error } = await _supa.from('setups').delete().eq('id', id);
  if (error) { alert('เกิดข้อผิดพลาด: ' + error.message); return; }
  allSetups = allSetups.filter(d => d.id !== id);
  filtered  = filtered.filter(d => d.id !== id);
  renderCards();
}

function escStr(s){ return (s||'').replace(/'/g,"\\'"); }

// ===== 2D DESKTOP DRAW =====
function drawDesktop(canvasId, d, W, H) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // BG
  ctx.fillStyle = '#0a0b0e';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(245,200,66,0.04)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  const sc = W/120; // 120cm table width baseline
  const cx = W/2, cy = H*0.58;

  // Parse table
  const twStr = (d.tableSize||'120×60').split('×')[0];
  const tdStr = (d.tableSize||'120×60').split('×')[1]||'60';
  const tw = Math.min((parseFloat(twStr)||120)*sc, W-10);
  const td = Math.min((parseFloat(tdStr)||60)*sc*0.85, H*0.55);

  // Table shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(cx-tw/2+3, cy-td/2+3, tw, td);

  // Table surface
  ctx.fillStyle = 'rgba(245,200,66,0.03)';
  ctx.strokeStyle = 'rgba(245,200,66,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(cx-tw/2, cy-td/2, tw, td, 3); ctx.fill(); ctx.stroke();

  // Table legs
  ctx.fillStyle = 'rgba(245,200,66,0.08)';
  [[cx-tw/2+4,cy+td/2],[cx+tw/2-4,cy+td/2],[cx-tw/2+4,cy-td/2],[cx+tw/2-4,cy-td/2]].forEach(([lx,ly])=>{
    ctx.fillRect(lx-3,ly-3,6,6);
  });

  // Monitor
  const monX = (+d.monX||0)*sc;
  const monW = Math.min(55*sc, tw*0.55);
  const monDeg = (+((d.monDeg||'0°').replace('°','')))*Math.PI/180;
  const mY = cy - td/2 - 4;
  ctx.save();
  ctx.translate(cx+monX, mY);
  ctx.rotate(monDeg);
  // Monitor glow
  ctx.shadowColor = 'rgba(123,97,255,0.4)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#7b61ff';
  ctx.fillRect(-monW/2,-2,monW,5);
  ctx.shadowBlur = 0;
  // Screen tint
  ctx.fillStyle = 'rgba(123,97,255,0.08)';
  ctx.fillRect(-monW/2,-12,monW,10);
  // Stand
  ctx.fillStyle = 'rgba(123,97,255,0.3)';
  ctx.fillRect(-4,2,8,5);
  ctx.restore();

  // Monitor label
  ctx.fillStyle = 'rgba(123,97,255,0.7)';
  ctx.font = `${Math.max(7,sc*3.5)}px Barlow Condensed,sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('MONITOR', cx+monX, mY-14);

  // Mousepad — ขนาดจริง (cm) scaled
  const padSizeMap = {
    'S': [25, 21], 'M': [35, 30], 'L': [45, 40], 'XL': [90, 40]
  };
  const padKey = (d.pad||'M').charAt(0);
  const [padRealW, padRealH] = padSizeMap[padKey] || padSizeMap['M'];
  let pw = Math.min(padRealW * sc, tw * 0.72);
  let ph = Math.min(padRealH * sc * 0.82, td * 0.72);
  const tableRight = cx + tw/2;
  const tableBot   = cy + td/2;

  let padLeft = cx + pw * 0.05;
  padLeft = Math.min(padLeft, tableRight - pw - 4); // ไม่เลยขอบขวา
  let padTop = cy - ph * 0.25;
  padTop = Math.min(padTop, tableBot - ph - 4);     // ไม่เลยขอบล่าง

  // Pad shadow
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(padLeft+3,padTop+3,pw,ph);
  // Pad surface
  ctx.fillStyle='rgba(239,68,68,0.07)'; ctx.strokeStyle='rgba(239,68,68,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(padLeft,padTop,pw,ph,3); ctx.fill(); ctx.stroke();
  // Pad texture
  ctx.strokeStyle='rgba(239,68,68,0.04)'; ctx.lineWidth=1;
  for(let lx=padLeft+8;lx<padLeft+pw;lx+=10){ctx.beginPath();ctx.moveTo(lx,padTop);ctx.lineTo(lx,padTop+ph);ctx.stroke();}
  ctx.fillStyle='rgba(239,68,68,0.5)'; ctx.font=`${Math.max(6,sc*3)}px Barlow Condensed,sans-serif`; ctx.textAlign='center';
  ctx.fillText('PAD', padLeft+pw/2, padTop+ph-4);

  // Mouse on pad — ขนาดจริงเมาส์ประมาณ 6x12 cm top view
  const mx = padLeft + pw*0.65;
  const my = padTop  + ph*0.42;
  const mw = Math.max(4, sc * 3.0);   // กว้าง ~6cm
  const mhh = mw * 1.8;               // ยาว ~12cm
  ctx.save(); ctx.translate(mx,my);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(1.5,2,mw,mhh,0,0,Math.PI*2); ctx.fill();
  // Body
  const mg = ctx.createRadialGradient(-mw*.2,-mhh*.3,1,0,0,mw*1.5);
  mg.addColorStop(0,'#3a3f4a'); mg.addColorStop(.5,'#242830'); mg.addColorStop(1,'#141720');
  ctx.fillStyle=mg;
  ctx.beginPath();
  ctx.moveTo(0,-mhh);
  ctx.bezierCurveTo(mw*.7,-mhh*.8,mw,-mhh*.2,mw*.85,mhh*.3);
  ctx.bezierCurveTo(mw*.6,mhh*.9,-mw*.6,mhh*.9,-mw*.85,mhh*.3);
  ctx.bezierCurveTo(-mw,-mhh*.2,-mw*.7,-mhh*.8,0,-mhh);
  ctx.closePath(); ctx.fill();
  // Seam
  ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=.7; ctx.stroke();
  // Center line
  ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=.8;
  ctx.beginPath(); ctx.moveTo(0,-mhh); ctx.lineTo(0,-mhh*.1); ctx.stroke();
  // Scroll wheel
  ctx.fillStyle='#181c24'; ctx.strokeStyle='rgba(245,200,66,.4)'; ctx.lineWidth=.6;
  ctx.beginPath(); ctx.roundRect(-mw*.18,-mhh*.55,mw*.36,mhh*.28,2); ctx.fill(); ctx.stroke();
  // LED dot
  ctx.fillStyle='rgba(245,200,66,0.7)';
  ctx.beginPath(); ctx.arc(0,mhh*.1,mw*.1,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Keyboard
  const kbW = Math.min(38*sc, tw*0.36);
  const kbH = 10*sc;
  const kbX = cx - kbW - pw*0.15;  // KB อยู่ซ้าย ห่างจาก pad
  const kbY = cy - td/2 + (parseFloat(d.kbY||10)*sc*0.5);
  ctx.fillStyle='rgba(245,200,66,0.04)'; ctx.strokeStyle='rgba(245,200,66,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(kbX,kbY,kbW,kbH,2); ctx.fill(); ctx.stroke();
  // Key dots
  ctx.fillStyle='rgba(245,200,66,0.15)';
  for(let ki=0;ki<4;ki++) for(let kj=0;kj<10;kj++){
    if(ki===0&&kj>8) continue;
    ctx.fillRect(kbX+4+kj*(kbW-8)/10, kbY+2+ki*(kbH-4)/4, (kbW-8)/10-1, (kbH-4)/4-1);
  }
  ctx.fillStyle='rgba(245,200,66,0.4)'; ctx.textAlign='center';
  ctx.font=`${Math.max(5,sc*2.8)}px Barlow Condensed,sans-serif`;
  ctx.fillText('KB', kbX+kbW/2, kbY+kbH/2+2);

  // Player circle
  const pY = cy + td/2 + 12;
  ctx.beginPath(); ctx.arc(cx, pY, 9, 0, Math.PI*2);
  ctx.fillStyle='rgba(245,200,66,0.1)'; ctx.fill();
  ctx.strokeStyle='rgba(245,200,66,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='rgba(245,200,66,0.7)'; ctx.font=`bold ${Math.max(5,sc*2.8)}px Barlow Condensed,sans-serif`;
  ctx.textAlign='center'; ctx.fillText('YOU', cx, pY+3);

  // Legend (mini)
  const legItems=[['rgba(245,200,66,0.3)','Table'],['rgba(123,97,255,0.7)','Monitor'],['rgba(239,68,68,0.5)','Pad'],['rgba(100,110,130,0.8)','Mouse']];
  legItems.forEach(([c,l],i)=>{
    ctx.fillStyle=c; ctx.fillRect(6,6+i*12,7,7);
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.font=`${Math.max(6,sc*2.6)}px Barlow Condensed,sans-serif`;
    ctx.textAlign='left';
    ctx.fillText(l,16,12+i*12);
  });
}

// ===== DETAIL MODAL =====
function openDetail(ign) {
  const d = allData.find(x=>x.ign===ign);
  if (!d) return;
  document.getElementById('dmIgn').innerHTML = (d.ign||'—') + (d.verified ? ' <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.3);border-radius:5px;padding:2px 8px;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.5px;vertical-align:middle;"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>VERIFIED</span>' : '');

  // Avatar ใน popup header
  const avatarEl = document.getElementById('dmAvatar');

        ${[['x2',d.scopeX2],['x3',d.scopeX3],['x4',d.scopeX4],['x6',d.scopeX6],['x8',d.scopeX8],['x15',d.scopeX15]].map(([label,val])=>`
        <div style="background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:8px;text-align:center;">
          <div style="font-size:16px;font-weight:700;color:var(--gold);font-family:'Barlow Condensed',sans-serif;">${val||'—'}</div>

        <div class="dmf"><div class="dmf-lbl">Storage</div><div class="dmf-val">${d.storage||'—'}</div></div>
        <div class="dmf"><div class="dmf-lbl">OS</div><div class="dmf-val">${d.os||'—'}</div></div>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="dm-sec-title">ให้คะแนน Setup นี้</div>

        ${[1,2,3,4,5].map(s=>`<span class="dm-star" data-id="${d.id}" data-s="${s}" onclick="rateStar('${d.id}',${s});renderDmStars('${d.id}')">☆</span>`).join('')}

function closeOverlay(e){
  if(e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
}

// ===== AUTH UI =====
function goToForm() {
  _supa.auth.getSession().then(({ data: { session } }) => {
    window.location.href = session ? 'pubg-setup-v1.html' : 'login.html';
  });
}

async function renderAuthBtn() {
  const { data: { session } } = await _supa.auth.getSession();
  const el = document.getElementById('authBtn');
  if (!el) return;
  if (session) {
    const email = session.user.email || '';
    const short = email.split('@')[0].substring(0, 12);

    // เช็ค role
    const { data: profile } = await _supa.from('profiles').select('role').eq('id', session.user.id).single();
    window._isAdmin = profile?.role === 'admin';

    // เช็คว่ามี setup แล้วหรือยัง
    const { data: mySetup } = await _supa
      .from('setups')
      .select('id')
      .eq('user_id', session.user.id)
      .limit(1)
      .single();

    // เปลี่ยนชื่อปุ่มตาม status
    const setupBtn = document.getElementById('setupBtn');
    if (setupBtn) {
      setupBtn.textContent = mySetup ? '⚙️ ตั้งค่าของฉัน' : '+ กรอก Setup ของฉัน';
    }

    // re-render cards ถ้าโหลดเสร็จแล้ว — ไม่จำเป็นแล้ว (init เช็ค admin ก่อน loadData)

    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;">
        ${window._isAdmin ? `<span style="font-size:10px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;padding:3px 7px;border:1px solid rgba(245,200,66,.3);border-radius:5px;white-space:nowrap;">👑 ADMIN</span>` : ''}
        <a href="profile.html" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-family:'Barlow Condensed',sans-serif;text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px;transition:all .15s;white-space:nowrap;" onmouseover="this.style.color='#f5c842';this.style.borderColor='#f5c842'" onmouseout="this.style.color='';this.style.borderColor=''">👤 <span class="hide-xs">Profile</span></a>
        <button onclick="logout()" style="padding:5px 10px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;transition:all .15s;white-space:nowrap;" onmouseover="this.style.borderColor='#ef4444';this.style.color='#fca5a5'" onmouseout="this.style.borderColor='';this.style.color=''">ออก</button>
      </div>`;
  } else {
    window._isAdmin = false;
    el.innerHTML = `<button onclick="location.href='login.html'" style="padding:5px 14px;border:1px solid var(--gold);border-radius:6px;background:transparent;color:var(--gold);font-size:11px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;transition:all .15s;" onmouseover="this.style.background='var(--gold)';this.style.color='#08090b'" onmouseout="this.style.background='transparent';this.style.color='var(--gold)'">LOGIN</button>`;
  }
}

async function logout() {
  await _supa.auth.signOut();
  renderAuthBtn();
}

// ===== INIT =====
(async () => {
  await renderAuthBtn(); // เช็ค admin ก่อน
  await loadData();      // โหลด data + render cards
  await loadRatings();   // โหลดดาวทั้งหมด
})();
</script>
